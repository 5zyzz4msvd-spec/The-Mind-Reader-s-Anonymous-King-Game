
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <title>国王游戏 · 密室档案</title>
  <style>
    :root {
      --ink: #e8e1d1;
      --muted: #aaa28f;
      --gold: #c6a35b;
      --gold-dim: #76623b;
      --blood: #873f3f;
      --panel: rgba(22, 23, 24, .96);
      --line: rgba(198, 163, 91, .27);
      --prism-w: min(90vw, 1180px);
      --prism-d: var(--prism-w);
      --prism-h: min(64dvh, 720px);
      --portrait-share: 30%;
      --side-camera-ratio: .45;
      --surface-camera-ratio: .16;
      --camera-ratio: var(--side-camera-ratio);
      --camera-depth: calc(var(--prism-w) * var(--camera-ratio));
      --side-focus-scale: 1.08;
      --surface-focus-scale: .78;
      --focus-scale: var(--side-focus-scale);
      --room-perspective: calc(var(--prism-w) * 1.2);
    }

    * { box-sizing: border-box; }

    html { background: #080909; }

    body {
      margin: 0;
      min-width: 280px;
      min-height: 100dvh;
      overflow-x: hidden;
      color: var(--ink);
      background:
        radial-gradient(circle at 50% 12%, rgba(145, 117, 65, .13), transparent 34rem),
        repeating-linear-gradient(115deg, rgba(255,255,255,.018) 0 1px, transparent 1px 7px),
        #090a0a;
      font-family: ui-serif, "Songti SC", "Noto Serif CJK SC", serif;
    }

    button { font: inherit; }

    button:focus-visible, [tabindex]:focus-visible {
      outline: 2px solid #e2bd70;
      outline-offset: 3px;
    }

    .app {
      width: 100%;
      min-height: 100dvh;
      padding: max(12px, env(safe-area-inset-top)) max(14px, env(safe-area-inset-right)) max(14px, env(safe-area-inset-bottom)) max(14px, env(safe-area-inset-left));
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 10px;
      isolation: isolate;
    }

    .topbar {
      width: min(1160px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(190px, .8fr) minmax(340px, 1.4fr) minmax(190px, .8fr);
      align-items: center;
      gap: 16px;
    }

    .status-card, .map-card, .view-nav {
      border: 1px solid var(--line);
      background: linear-gradient(145deg, rgba(31,31,29,.92), rgba(12,13,13,.96));
      box-shadow: 0 12px 35px rgba(0,0,0,.34), inset 0 1px rgba(255,255,255,.035);
    }

    .status-card { padding: 12px 14px; min-height: 88px; }

    .eyebrow {
      margin: 0 0 5px;
      color: var(--gold);
      font: 700 10px/1.2 ui-sans-serif, system-ui, sans-serif;
      letter-spacing: .2em;
      text-transform: uppercase;
    }

    .king-line {
      display: flex;
      align-items: baseline;
      gap: 8px;
      min-width: 0;
    }

    .king-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #f2d28d;
      font-size: clamp(19px, 2.3vw, 28px);
      font-weight: 700;
    }

    .day-seal {
      flex: 0 0 auto;
      border: 1px solid var(--gold-dim);
      padding: 3px 7px;
      color: var(--muted);
      font: 600 11px/1 ui-sans-serif, system-ui, sans-serif;
    }

    .scene-line {
      margin-top: 7px;
      color: var(--muted);
      font: 12px/1.5 ui-sans-serif, system-ui, sans-serif;
    }

    .map-card {
      position: relative;
      height: 112px;
      padding: 6px;
      overflow: hidden;
    }

    .map-card::before, .map-card::after {
      content: "";
      position: absolute;
      pointer-events: none;
    }

    .map-card::before {
      inset: 20% 24%;
      border: 1px solid rgba(198,163,91,.35);
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(198,163,91,.14), rgba(12,13,13,.72) 70%);
      box-shadow: inset 0 0 18px rgba(0,0,0,.55);
    }
    .map-card::after {
      content: "圆桌";
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      color: rgba(238,228,204,.6);
      font: 700 9px/1 ui-sans-serif, system-ui, sans-serif;
      letter-spacing: .16em;
    }

    .map-room {
      position: relative;
      min-width: 0;
      border: 1px solid rgba(198,163,91,.18);
      color: #bcb39d;
      background: #151616;
      font: 600 11px/1 ui-sans-serif, system-ui, sans-serif;
      cursor: pointer;
      transition: color .2s, border-color .2s, background .2s;
      position: absolute;
      width: 25%;
      height: 26%;
      z-index: 2;
    }

    .map-room[data-face="0"] { top: 3%; left: 37.5%; }
    .map-room[data-face="1"] { top: 33%; right: 2%; }
    .map-room[data-face="2"] { bottom: 3%; right: 16%; }
    .map-room[data-face="3"] { bottom: 3%; left: 16%; }
    .map-room[aria-current="true"] { color: #f2d28d; border-color: var(--gold); background: #242119; }

    .user-seat {
      position: absolute;
      left: 2%;
      top: 33%;
      z-index: 2;
      width: 25%;
      height: 26%;
      display: grid;
      place-items: center;
      min-width: 0;
      border: 1px solid rgba(224,209,171,.25);
      background: #101111;
      color: #bcb39d;
      font: 700 10px/1 ui-sans-serif, system-ui, sans-serif;
      letter-spacing: .08em;
    }

    .view-nav {
      min-width: 0;
      min-height: 88px;
      padding: 12px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      grid-template-rows: repeat(2, minmax(0, 1fr));
      align-items: center;
      gap: 7px;
    }

    .view-nav .nav-btn { min-width: 0; min-height: 30px; height: 100%; padding: 0; }
    .view-nav #lookUp { grid-column: 2; grid-row: 1; }
    .view-nav #prevFace { grid-column: 1; grid-row: 2; }
    .view-nav #lookDown { grid-column: 2; grid-row: 2; }
    .view-nav #nextFace { grid-column: 3; grid-row: 2; }

    .viewport {
      position: relative;
      width: 100%;
      min-height: calc(var(--prism-h) + 12px);
      display: grid;
      place-items: center;
      perspective: var(--room-perspective);
      perspective-origin: 50% 47%;
      overflow: hidden;
      touch-action: pan-y;
      cursor: default;
    }

    .prism {
      position: relative;
      width: var(--prism-w);
      height: var(--prism-h);
      pointer-events: none;
      transform-style: preserve-3d;
      transform: translateZ(var(--camera-depth)) rotateX(0deg) rotateY(0deg) scale3d(var(--focus-scale), var(--focus-scale), var(--focus-scale));
      transition: transform .72s cubic-bezier(.22,.78,.2,1);
      will-change: transform;
    }


    .face {
      position: absolute;
      left: 50%;
      top: 0;
      width: var(--prism-w);
      height: var(--prism-h);
      margin-left: calc(var(--prism-w) / -2);
      overflow: hidden;
      pointer-events: none;
      backface-visibility: hidden;
      border: 1px solid rgba(198,163,91,.42);
      background:
        linear-gradient(90deg, rgba(198,163,91,.045), transparent 23%, transparent 77%, rgba(198,163,91,.035)),
        var(--panel);
      box-shadow: 0 26px 65px rgba(0,0,0,.62), inset 0 0 80px rgba(0,0,0,.28);
    }

    .face[data-name].is-active { pointer-events: auto; }

    /* 四面墙的正面全部朝向围合空间内部；相机位于围合空间内。 */
    .face:nth-child(1) { transform: translateZ(calc(var(--prism-d) / -2)); }
    .face:nth-child(2) {
      transform: rotateY(-90deg) translateZ(calc(var(--prism-w) / -2));
    }
    .face:nth-child(3) { transform: rotateY(180deg) translateZ(calc(var(--prism-w) / -2)); }
    .face:nth-child(4) {
      transform: rotateY(90deg) translateZ(calc(var(--prism-w) / -2));
    }

    .face-frame { height: 100%; display: grid; grid-template-rows: auto 1fr; }

    .face-heading {
      min-height: 57px;
      padding: 10px 17px 9px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      background: rgba(8,9,9,.68);
    }

    .identity { min-width: 0; }
    .identity h2 { margin: 0; color: #f1e8d4; font-size: clamp(20px, 2.4vw, 30px); letter-spacing: .08em; }
    .identity p { margin: 3px 0 0; color: var(--muted); font: 11px/1.2 ui-sans-serif, system-ui, sans-serif; }

    .face-body {
      min-height: 0;
      padding: 15px;
      display: grid;
      grid-template-columns: minmax(150px, var(--portrait-share)) minmax(0, 1fr);
      gap: 15px;
    }

    .profile-rail {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: minmax(210px, 78%) auto;
      gap: 10px;
    }

    .portrait {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 0;
      padding: 0;
      overflow: hidden;
      border: 1px solid rgba(198,163,91,.35);
      color: inherit;
      background: linear-gradient(155deg, #35332e, #151617 58%, #29251d);
      box-shadow: inset 0 0 0 5px rgba(0,0,0,.18);
      cursor: zoom-in;
      appearance: none;
    }

    .portrait:hover { border-color: rgba(230,199,126,.72); }
    .portrait:focus-visible { outline-offset: -4px; }

    .portrait img { width: 100%; height: 100%; display: block; object-fit: cover; object-position: 50% 32%; filter: saturate(.74) contrast(1.01) brightness(.98); }
    .face[data-name="林安"] .portrait img,
    .face[data-name="穆裳希"] .portrait img,
    .face[data-name="张曲溪"] .portrait img { object-position: 50% 8%; }

    .portrait-fallback {
      position: absolute;
      inset: 0;
      display: none;
      place-items: center;
      color: rgba(236,218,176,.58);
      font-size: clamp(42px, 7vw, 76px);
      letter-spacing: .08em;
    }

    .portrait::after {
      content: "IDENTIFICATION / 证件档案";
      position: absolute;
      inset: auto 0 0;
      padding: 7px 8px;
      color: rgba(230,219,193,.75);
      background: linear-gradient(transparent, rgba(0,0,0,.78));
      font: 8px/1.4 ui-sans-serif, system-ui, sans-serif;
      letter-spacing: .12em;
    }

    .quick-state { min-width: 0; display: grid; gap: 6px; align-content: start; }

    .state-row {
      min-width: 0;
      padding: 7px 8px;
      border-left: 2px solid var(--gold-dim);
      background: rgba(255,255,255,.025);
    }

    .state-row b, .field-title {
      display: block;
      margin-bottom: 4px;
      color: #c8ad72;
      font: 700 10px/1.2 ui-sans-serif, system-ui, sans-serif;
      letter-spacing: .08em;
    }

    .state-row span { display: block; color: #cfc7b7; font: 11px/1.45 ui-sans-serif, system-ui, sans-serif; overflow-wrap: anywhere; }

    .face-interact-btn {
      flex: 0 0 auto;
      min-height: 34px;
      max-width: 180px;
      padding: 6px 11px;
      border: 1px solid var(--gold-dim);
      color: #ead7aa;
      background: linear-gradient(#2e291f, #171817);
      pointer-events: none;
      font: 700 11px/1.2 ui-sans-serif, system-ui, sans-serif;
      box-shadow: 0 7px 22px rgba(0,0,0,.24);
    }
    .face-interact-btn.is-complete { border-color: #557b62; color: #b7d3bc; }
    .face-interact-btn[hidden] { display: none; }

    .interaction-hit-target {
      position: absolute;
      z-index: 8;
      padding: 0;
      border: 0;
      opacity: 0;
      background: transparent;
      cursor: pointer;
    }
    .interaction-hit-target[hidden] { display: none; }
    .interaction-hit-target:focus-visible { opacity: .14; outline: 2px solid #e6c77e; }
    .portrait-hit-target {
      position: absolute;
      z-index: 9;
      padding: 0;
      border: 0;
      opacity: 0;
      background: transparent;
      cursor: zoom-in;
    }
    .portrait-hit-target[hidden] { display: none; }
    .portrait-hit-target:focus-visible { opacity: .1; outline: 2px solid #e6c77e; outline-offset: -3px; }

    .utility-face {
      top: 50%;
      width: var(--prism-w);
      height: var(--prism-d);
      margin-top: calc(var(--prism-d) / -2);
      overflow: hidden;
      padding: 24px;
    }
    .utility-face h2 { margin: 0 0 8px; color: #f0dfb7; font-size: clamp(24px, 4vw, 42px); }
    .surface-content {
      min-height: 100%;
      transform-origin: 50% 50%;
      transition: transform .72s cubic-bezier(.22,.78,.2,1);
    }
    .surface-sheet {
      position: relative;
      min-height: 100%;
      padding-left: 17px;
      opacity: 0;
      clip-path: inset(0 100% 0 0);
      background: linear-gradient(90deg, rgba(198,163,91,.08), rgba(18,19,19,.15) 12%, transparent 38%);
      transition: clip-path .42s ease, opacity .3s ease;
    }
    .surface-sheet::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 5px;
      border: 1px solid rgba(222,190,119,.55);
      background: linear-gradient(90deg, #493b24, #bd9853, #493b24);
      box-shadow: 7px 0 22px rgba(0,0,0,.45);
    }
    .surface-overlay {
      position: absolute;
      inset: 4% 7%;
      z-index: 7;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity .38s ease, visibility .38s ease;
    }
    .surface-overlay::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 2;
      display: grid;
      place-items: center;
      pointer-events: none;
      color: #d3bd84;
      opacity: 0;
      font-size: clamp(28px, 5vw, 54px);
      font-weight: 500;
      letter-spacing: .28em;
      text-indent: .28em;
      text-shadow: 0 8px 26px rgba(0,0,0,.8);
    }
    .surface-overlay[data-view="top"],
    .surface-overlay[data-view="bottom"] { opacity: 1; visibility: visible; pointer-events: auto; }
    .surface-overlay[data-view="top"]::before { content: "地图"; animation: surface-title-reveal 1.55s ease .22s both; }
    .surface-overlay[data-view="bottom"]::before { content: "法令"; animation: surface-title-reveal 1.55s ease .22s both; }
    .surface-overlay .surface-sheet {
      position: absolute;
      inset: 0;
      min-height: 0;
      padding: 24px 26px 24px 40px;
      overflow: auto;
      border: 1px solid rgba(198,163,91,.48);
      background:
        linear-gradient(90deg, rgba(198,163,91,.1), transparent 28%),
        rgba(16,17,17,.97);
      box-shadow: 0 24px 70px rgba(0,0,0,.68);
    }
    .surface-overlay[data-view="top"] .map-sheet,
    .surface-overlay[data-view="bottom"] .rules-sheet {
      opacity: 1;
      clip-path: inset(0 0 0 0);
      transition: clip-path 1.35s cubic-bezier(.2,.72,.16,1) 1.38s, opacity .72s ease 1.38s;
    }
    @keyframes surface-title-reveal {
      0% { opacity: 0; filter: blur(7px); transform: scale(.97); }
      32%, 68% { opacity: 1; filter: blur(0); transform: scale(1); }
      100% { opacity: 0; filter: blur(2px); transform: scale(1.015); }
    }
    .surface-kicker { margin: 0 0 18px; color: #9f927b; font: 700 10px/1.4 ui-sans-serif, system-ui, sans-serif; letter-spacing: .14em; text-transform: uppercase; }
    .top-face { transform: rotateX(-90deg) translateZ(calc(var(--prism-h) / -2)); }
    .bottom-face { transform: rotateX(90deg) translateZ(calc(var(--prism-h) / -2)); }
    .surface-map {
      position: relative;
      width: min(660px, 100%);
      height: min(390px, calc(100% - 86px));
      min-height: 280px;
      margin: 0 auto;
      border: 1px solid rgba(198,163,91,.35);
      background: radial-gradient(ellipse at center, rgba(198,163,91,.1), rgba(9,10,10,.92) 66%);
    }
    .surface-table { position: absolute; inset: 31% 30%; display: grid; place-items: center; border: 1px solid var(--gold-dim); border-radius: 50%; color: #dbc58f; }
    .surface-room {
      position: absolute;
      width: clamp(82px, 15%, 112px);
      aspect-ratio: 1;
      padding: 9px;
      display: grid;
      grid-template-rows: 1fr auto;
      place-items: center;
      border: 1px solid rgba(198,163,91,.36);
      color: #c9b98f;
      text-align: center;
      background: #121313;
      font: 700 11px/1.2 ui-sans-serif, system-ui, sans-serif;
      box-shadow: inset 0 0 20px rgba(0,0,0,.38);
    }
    .room-toilet {
      width: 76%;
      min-height: 22px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(198,163,91,.28);
      color: #8f856f;
      background: #0b0c0c;
      font-size: 9px;
      font-style: normal;
    }
    .surface-room.r1 { top: 5%; left: 50%; transform: translateX(-50%); }
    .surface-room.r2 { top: 39%; right: 4%; }
    .surface-room.r3 { bottom: 5%; right: 18%; }
    .surface-room.r4 { bottom: 5%; left: 18%; }
    .surface-room.r5 { top: 39%; left: 4%; }
    .surface-rules { max-height: calc(100% - 78px); overflow-y: auto; }

    .dossier-scroll {
      min-width: 0;
      min-height: 0;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding: 0 7px 8px 0;
      scrollbar-width: thin;
      scrollbar-color: var(--gold-dim) #171818;
    }

    .dossier-scroll::-webkit-scrollbar { width: 7px; }
    .dossier-scroll::-webkit-scrollbar-thumb { background: var(--gold-dim); }

    .section-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }

    .field {
      min-width: 0;
      margin-bottom: 9px;
      padding: 11px 12px;
      border: 1px solid rgba(198,163,91,.16);
      background: rgba(255,255,255,.022);
    }

    .field p { margin: 0; color: #d2cab9; font-size: 12px; line-height: 1.65; overflow-wrap: anywhere; }
    .field .subline + .subline { margin-top: 7px; padding-top: 7px; border-top: 1px solid rgba(255,255,255,.06); }
    .subline em { color: #978d7a; font: normal 10px/1 ui-sans-serif, system-ui, sans-serif; }

    .thought { border-left: 3px solid var(--blood); }
    .thought p { color: #e2d7c0; font-style: italic; }

    .chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip { padding: 4px 7px; border: 1px solid rgba(198,163,91,.28); color: #c8b78e; background: #171817; font: 10px/1 ui-sans-serif, system-ui, sans-serif; }

    .relation { display: grid; grid-template-columns: 4.5em 1fr 2.5em; align-items: center; gap: 7px; margin-top: 7px; color: #bab09d; font: 10px/1 ui-sans-serif, system-ui, sans-serif; }
    .relation-track { position: relative; height: 3px; background: linear-gradient(90deg, #6d3434 0 50%, #2f302e 50% 100%); }
    .relation-track::after { content: ""; position: absolute; left: 50%; top: -2px; width: 1px; height: 7px; background: #aaa18f; }
    .relation-fill { position: absolute; top: 0; left: 50%; height: 100%; background: var(--gold); }

    .rules { display: grid; gap: 7px; }
    .rule { padding: 9px 10px; border-left: 2px solid var(--gold); background: rgba(198,163,91,.055); }
    .rule.is-revoked { opacity: .48; border-left-color: #777; }
    .rule-head { display: flex; justify-content: space-between; gap: 8px; color: #e0cfaa; font: 700 11px/1.3 ui-sans-serif, system-ui, sans-serif; }
    .rule-meta { color: #918774; white-space: nowrap; font-weight: 500; }
    .rule p { margin: 5px 0 0; color: #c7bdab; font-size: 11px; line-height: 1.55; }

    .empty { padding: 10px; border: 1px dashed rgba(198,163,91,.22); color: #817a6d; font: 11px/1.5 ui-sans-serif, system-ui, sans-serif; }

    .controls {
      width: min(960px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 9px;
      align-items: center;
    }

    .nav-btn, .rules-btn, .drawer-close, .flow-btn, .modal-btn {
      min-height: 42px;
      border: 1px solid var(--gold-dim);
      color: #e3d2ad;
      background: linear-gradient(#28251e, #151616);
      cursor: pointer;
      transition: border-color .2s, color .2s, transform .2s;
    }

    .nav-btn:hover, .rules-btn:hover, .drawer-close:hover, .flow-btn:hover, .modal-btn:hover { border-color: #d2ae62; color: #f8e5b9; }
    .nav-btn:active, .rules-btn:active, .flow-btn:active, .modal-btn:active { transform: translateY(1px); }
    .flow-btn:disabled, .modal-btn:disabled { cursor: wait; opacity: .52; }

    .face-dots { display: flex; justify-content: center; gap: 7px; }
    .face-dot { width: 9px; height: 9px; padding: 0; border: 1px solid var(--gold-dim); border-radius: 50%; background: transparent; cursor: pointer; }
    .face-dot[aria-current="true"] { background: var(--gold); box-shadow: 0 0 0 3px rgba(198,163,91,.12); }

    .rules-btn { padding: 0 16px; white-space: nowrap; font: 700 12px/1 ui-sans-serif, system-ui, sans-serif; letter-spacing: .08em; }

    .day-flow {
      grid-column: 1 / -1;
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 9px;
      border: 1px solid rgba(198,163,91,.2);
      background: rgba(15,16,16,.88);
    }
    .flow-copy { min-width: 0; color: #aaa18f; font: 11px/1.45 ui-sans-serif, system-ui, sans-serif; overflow-wrap: anywhere; }
    .flow-copy b { color: #dfca9d; }
    .flow-btn { flex: 0 0 auto; min-width: 112px; padding: 0 14px; font: 700 12px/1 ui-sans-serif, system-ui, sans-serif; }
    .flow-btn[hidden] { display: none; }

        });
      }
      return commitAction('beginDecree', [], function (next) {
        var system = next['系统'] || {};
        var playerSubmission = system['_当前国王'] === '玩家'
          ? '玩家提交的新法令内容或撤销目标是：“' + submitted + '”。请据此完成正式颁布或撤销。'
          : '宿主已经确定当日国王为“' + system['_当前国王'] + '”。必须只由此人依据其人设和当前关系决定法令内容。';
        return '【前端私密操作，不是公开发言】【每日流程·颁布法令】我已启动第' + system['_当前天数'] + '日的匿名法令终端。只读宿主变量中的当日国王是“' + system['_当前国王'] + '”，不得重新抽签、改选、猜测或让另一人代为颁布。' + playerSubmission + '完成后向全员广播法令正文，但不要公开国王身份。';
      });
    },
    submitInteraction: function (roleName, method) {
      var trimmed = String(method || '').trim();
      if (!trimmed) return Promise.reject(new Error('请输入非空的互动方式'));
      return commitAction('submitInteraction', [roleName, trimmed], function (next) {
        var request = (next['系统'] || {})['_最近互动请求'] || {};
        var supplements = Array.isArray(request['补全对象']) ? request['补全对象'] : [];
        var followup = supplements.length
          ? '在这次互动结束后，请另用明显区别于正文的旁观记录样式，依次描写' + roleName + '与' + supplements.join('、') + '之间今日尚未发生的互动。'
          : '这是追加互动，不需要把它误写成我已经说过某句具体台词。';
        return '【每日流程·互动请求】我想以“' + trimmed + '”的方式与' + roleName + '互动。请把它作为行动意图来展开，不要擅自替我补写具体台词。' + followup;
      });
    },
    overnight: function () {
      return commitAction('advanceDay', [], function (next) {
        var system = next['系统'] || {};
        return system['_每日阶段'] === '终局'
          ? '【每日流程·过夜】第15日已经结束。请描写最后一夜与国王游戏终局。'
          : '【每日流程·过夜】今日互动已经完成，我选择结束本日并过夜。请描写夜间结算与第' + system['_当前天数'] + '日清晨的统一广播。';
      });
    }
  };
})();

        },

    const $ = (selector, root = document) => root.querySelector(selector);
    const el = (tag, className, text) => {
      const node = document.createElement(tag);
      if (className) node.className = className;
      if (text !== undefined && text !== null) node.textContent = String(text);
      return node;
    };
    const asObject = value => value && typeof value === "object" && !Array.isArray(value) ? value : {};
    const asArray = value => Array.isArray(value) ? value : [];
    const num = (value, min, max, fallback = 0) => Math.max(min, Math.min(max, Number.isFinite(Number(value)) ? Number(value) : fallback));
    const displayPerson = (name, userName) => name === "玩家" ? userName : (name || "—");

    let state = PREVIEW_STATE;
    let userName = "你";
    let faceIndex = 0;
    let angle = 0;
    let pitch = 0;
    let lastFocused = null;
    let interactionRole = "";
    let modalMode = "";
    let interactionLastFocused = null;
    let actionBusy = false;
    let roomMoving = false;
    let hitSyncTimer = 0;
    let portraitLastFocused = null;
    let activePortraitName = "";
    let endingLastFocused = null;
    let activeEnding = null;
    let endingPresentedKey = "";

    function appendField(root, title, paragraphs, className = "") {
      const field = el("section", `field ${className}`.trim());
      field.append(el("span", "field-title", title));
      paragraphs.forEach(item => field.append(el("p", item.className || "", item.text || "暂无记录")));
      root.append(field);
      return field;
    }

    function renderRules(root, rules) {
      root.replaceChildren();
      if (!asArray(rules).length) {
        root.append(el("div", "empty", "尚未颁布个人法令。"));
        return;
      }
      [...rules].sort((a, b) => num(b?.优先级, -9999, 9999) - num(a?.优先级, -9999, 9999)).forEach(raw => {
        const ruleData = asObject(raw);
        const rule = el("article", `rule${ruleData.状态 === "已撤销" ? " is-revoked" : ""}`);
        const head = el("div", "rule-head");
        head.append(el("span", "", `${ruleData.id || "—"} · ${ruleData.标题 || "未命名法令"}`));
        head.append(el("span", "rule-meta", `第${num(ruleData.颁布日, 1, 15, 1)}日 · ${ruleData.状态 || "生效"}`));
        rule.append(head, el("p", "", ruleData.全文 || "暂无正文"));
        root.append(rule);
      });
    }

    function buildFace(name, data) {
      const info = asObject(data.信息);
      const status = asObject(data.状态);
      const upper = asObject(data.上衣);
      const lower = asObject(data.下衣);
      const relations = asObject(data.关系);
      const face = el("article", "face");
      face.dataset.name = name;
      const frame = el("div", "face-frame");
      const heading = el("header", "face-heading");
      const identity = el("div", "identity");
      identity.append(el("h2", "", name), el("p", "", `${info.年龄 || "—"} 岁 · ${info.公开身份 || "身份未公开"}`));
      const system = asObject(state.系统);
      const completed = asArray(system._玩家已互动角色).includes(name);
      const faceInteract = el("button", `face-interact-btn${completed ? " is-complete" : ""}`, completed ? `✓ 继续与${name}互动` : `与${name}互动`);
      faceInteract.type = "button";
      faceInteract.dataset.interactionName = name;
      faceInteract.hidden = system._每日阶段 !== "自由互动";
      faceInteract.tabIndex = -1;
      faceInteract.setAttribute("aria-hidden", "true");
      heading.append(identity, faceInteract);

      const body = el("div", "face-body");
      const rail = el("aside", "profile-rail");
      const portrait = el("button", "portrait");
      portrait.type = "button";
      portrait.dataset.portraitName = name;
      portrait.setAttribute("aria-label", `查看${name}证件照全图`);
      const image = el("img");
      image.src = PORTRAITS[name];
      image.alt = `${name}的证件照`;
      image.loading = "eager";
      image.draggable = false;
      const fallback = el("span", "portrait-fallback", name.slice(-1));
      image.addEventListener("error", () => { image.hidden = true; fallback.style.display = "grid"; });
      portrait.addEventListener("click", () => openPortrait(name, portrait));
      portrait.append(image, fallback);
      const quick = el("div", "quick-state");
      [["身体", status.身体], ["当前行动", status.当前行动]].forEach(([label, value]) => {
        const row = el("div", "state-row");
        row.append(el("b", "", label), el("span", "", value || "暂无记录"));
        quick.append(row);
      });
      rail.append(portrait, quick);

      const dossier = el("div", "dossier-scroll");
      const clothes = el("div", "section-grid");
      const upperField = appendField(clothes, "上衣 / 上半身", []);
      upperField.append(
        Object.assign(el("p", "subline"), { textContent: `衣着　${upper.衣着 || "暂无记录"}` }),
        Object.assign(el("p", "subline"), { textContent: `肉体　${upper.肉体 || "暂无记录"}` })
      );
      const lowerField = appendField(clothes, "下衣 / 下半身", []);
      lowerField.append(
        Object.assign(el("p", "subline"), { textContent: `衣着　${lower.衣着 || "暂无记录"}` }),
        Object.assign(el("p", "subline"), { textContent: `肉体　${lower.肉体 || "暂无记录"}` })
      );
      dossier.append(clothes);
      appendField(dossier, "心声 / 读心术", [{ text: data.心理 || "暂无记录" }], "thought");

      const tendency = el("section", "field");
      tendency.append(el("span", "field-title", "倾向 / 读心术"));
      const chips = el("div", "chips");
      const tendencyItems = asArray(data.行动倾向).slice(0, 3);
      (tendencyItems.length ? tendencyItems : ["暂无记录"]).forEach(item => chips.append(el("span", "chip", item)));
      tendency.append(chips);
      dossier.append(tendency);

      const relationField = el("section", "field");
      relationField.append(el("span", "field-title", "好感 / 读心术"));
      [...NAMES.filter(other => other !== name), "玩家"].forEach(other => {
        const score = Math.round(num(asObject(relations[other]).好感度, -100, 100));
        const row = el("div", "relation");
        const track = el("span", "relation-track");
        const fill = el("i", "relation-fill");
        const width = Math.abs(score) / 2;
        fill.style.width = `${width}%`;
        fill.style.left = score < 0 ? `${50 - width}%` : "50%";
        fill.style.background = score < 0 ? "#8b4545" : "var(--gold)";
        track.append(fill);
        row.append(el("span", "", displayPerson(other, userName)), track, el("span", "", score > 0 ? `+${score}` : score));
        relationField.append(row);
      });
      dossier.append(relationField);

      const ruleField = el("section", "field");
      ruleField.append(el("span", "field-title", `${name}颁布的法令`));
      const rules = el("div", "rules");
      renderRules(rules, data.颁布规则);
      ruleField.append(rules);
      dossier.append(ruleField);

      body.append(rail, dossier);
      frame.append(heading, body);
      face.append(frame);
      return face;
    }

    function buildRulesSheet(nextState) {

    function renderSurfaceOverlay(nextState) {

    function openPortrait(name, trigger) {

      $("#portraitViewerTitle").textContent = `${name} · 证件照全图`;

      image.src = PORTRAITS[name];

    function closePortrait(restoreFocus = true) {
      const backdrop = $("#portraitBackdrop");
      backdrop.classList.remove("is-open");
      backdrop.setAttribute("aria-hidden", "true");
      const currentPortrait = activePortraitName
        ? document.querySelector(`.portrait[data-portrait-name="${activePortraitName}"]`)
        : null;

    function normalizeEnding(system) {
      const raw = asObject(system.结局展示);
      const title = String(raw.标题 || "").trim();
      const truth = String(raw.真相判定 || "").trim();
      const summary = String(raw.摘要 || "").trim();
      if (!title || !truth || !summary) return null;
      const diagnosis = asObject(raw.诊断);
      const confessors = Array.isArray(raw.忏悔者)
        ? raw.忏悔者.map(item => String(item)).filter(Boolean).join("、")
        : String(raw.忏悔者 || "无");
      return {
        标题: title,
        忏悔者: confessors || "无",
        真相判定: truth,
        摘要: summary,
        主题: String(raw.主题 || "暗金"),
        诊断来源: String(diagnosis.来源 || "医院诊断"),
        诊断结论: String(diagnosis.结论 || "所谓读心术是项圈故障损伤后的臆想")
      };
    }

    function populateEnding(ending) {
      const card = $("#endingCard");
      card.dataset.theme = ending.主题;
      $("#endingRoute").textContent = "终局";
      $("#endingTitle").textContent = ending.标题;
      $("#endingConfessor").textContent = ending.忏悔者;
      $("#endingTruth").textContent = ending.真相判定;
      $("#endingDiagnosis").textContent = `${ending.诊断来源}：${ending.诊断结论}`;
      const summary = $("#endingSummary");
      summary.textContent = ending.摘要;

    function openEnding(ending = activeEnding) {
      if (!ending) return;

      if (!backdrop.classList.contains("is-open")) endingLastFocused = document.activeElement;
      populateEnding(ending);
      backdrop.classList.add("is-open");
      backdrop.setAttribute("aria-hidden", "false");
      $("#reopenEnding").hidden = true;
      requestAnimationFrame(() => $("#closeEnding").focus());
    }

    function closeEnding(restoreFocus = true) {
      const backdrop = $("#endingBackdrop");
      backdrop.classList.remove("is-open");
      backdrop.setAttribute("aria-hidden", "true");
      $("#reopenEnding").hidden = !activeEnding;
      const focusTarget = endingLastFocused?.isConnected ? endingLastFocused : $("#reopenEnding");
      if (restoreFocus && focusTarget && typeof focusTarget.focus === "function") focusTarget.focus();
      endingLastFocused = null;
    }

    function renderEnding(system) {
      const ending = normalizeEnding(system);
      activeEnding = ending;
      if (!ending) {
        endingPresentedKey = "";
        $("#reopenEnding").hidden = true;
        if ($("#endingBackdrop").classList.contains("is-open")) closeEnding(false);
        return;
      }
      populateEnding(ending);
      const key = JSON.stringify([ending.路线, ending.标题, ending.忏悔者, ending.诊断来源, ending.诊断结论]);
      if (key !== endingPresentedKey) {
        endingPresentedKey = key;
        $("#reopenEnding").hidden = true;
        requestAnimationFrame(() => {
          if (activeEnding && endingPresentedKey === key) openEnding(activeEnding);
        });
      } else {
        $("#reopenEnding").hidden = $("#endingBackdrop").classList.contains("is-open");
      }
    }

    function render(nextState = state) {
      state = asObject(nextState);
      const system = asObject(state.系统);
      const roles = asObject(state.角色);
      const player = asObject(state.玩家);
      $("#currentKing").textContent = system._当前国王 ? displayPerson(system._当前国王, userName) : "尚未选出";
      $("#currentDay").textContent = `第 ${Math.round(num(system._当前天数, 1, 15, 1))} / 15 日`;
      $("#sceneInfo").textContent = `${system.当前时间 || "时间未知"} · ${system.当前地点 || "地点未知"} · ${system.当前阶段 || "阶段未知"}`;
      $("#userSeat").textContent = userName;
      const prism = $("#prism");
      prism.replaceChildren(
        ...NAMES.map(name => buildFace(name, asObject(roles[name]))),
        buildTopFace(),
        buildBottomFace()
      );
      renderSurfaceOverlay(state);
      renderRules($("#playerRules"), player.颁布规则);
      renderDailyFlow(system);
      renderEnding(system);
      updateNavigation();
      requestAnimationFrame(() => {
        syncInteractionHitTarget();
        syncPortraitHitTarget();
      });
    }

    function renderDailyFlow(system) {
      const stage = system._每日阶段 || "待颁布法令";
      const completed = NAMES.filter(name => asArray(system._玩家已互动角色).includes(name));
      const button = $("#primaryDailyAction");
      const status = $("#flowStatus");
      button.hidden = true;
      button.disabled = actionBusy;
      button.dataset.action = "";
      if (stage === "待颁布法令") {
        const day = Math.round(num(system._当前天数, 1, 15, 1));
        status.textContent = day === 1
          ? "序章圆桌苏醒 · 待匿名国王颁布法令，广播后开放今日互动"
          : "清晨各自在房间醒来 · 待匿名国王颁布法令，广播前不得离房互动";
        button.textContent = actionBusy ? "正在提交……" : "颁布法令";
        button.dataset.action = "decree";
        button.hidden = false;
      } else if (stage === "自由互动") {
        status.textContent = `今日互动 ${completed.length} / ${NAMES.length}：${completed.length ? completed.join("、") : "尚未与任何角色互动"}`;
        if (system._可过夜 === true) {
          button.textContent = actionBusy ? "正在提交……" : "过夜";
          button.dataset.action = "overnight";
          button.hidden = false;
        }
      } else if (stage === "夜间") {
        status.textContent = "夜间结算中 · 请等待新一日广播";
      } else if (stage === "终局") {
        status.textContent = num(system._当前天数, 1, 15, 1) < 15
          ? "流程已被强制终止 · 已进入终局"
          : "十五日流程已结束 · 已进入终局";
      } else {
        status.textContent = `当前阶段：${stage}`;
      }
      requestAnimationFrame(syncInteractionHitTarget);
    }

    function showActionError(message = "") {
      $("#actionError").textContent = message;
    }

    function openInteraction(name) {
      const system = asObject(state.系统);
      if (system._每日阶段 !== "自由互动") {
        showActionError("请先完成当天法令广播，再开始互动。");

      }

      interactionRole = name;
      interactionLastFocused = document.activeElement;
      $("#interactionTitle").textContent = `与${name}互动`;
      $("#interactionNote").textContent = "这里只提交互动方式，不会把你的请求冒充成你已经说过的具体台词。按 Ctrl/⌘ + Enter 可提交。";
      $("#interactionLabel").textContent = "互动方式";
      $("#interactionMethod").placeholder = "例如：邀请她单独检查走廊，并先询问她昨晚最后记得的画面";
      $("#submitInteraction").textContent = "提交互动";
      $("#interactionMethod").value = "";
      $("#interactionError").textContent = "";

    }

    function openDecree() {
      modalMode = "decree";
      interactionRole = "";
      interactionLastFocused = document.activeElement;
      $("#interactionTitle").textContent = "颁布你的法令";
      $("#interactionNote").textContent = "填写一条能实际执行、能由行为或结果判断的新法令，或明确写出要撤销的法令编号/标题。不能测谎、强制真话、赋予超自然能力、破坏密室，或造成死亡、残疾及无法短期恢复的伤害。科学上不可能的提案第一次会触发全设施警告，第二次会直接执行终止处分。按 Ctrl/⌘ + Enter 可提交。";
      $("#interactionLabel").textContent = "新法令内容或撤销目标";
      $("#interactionMethod").placeholder = "例如：新法令：…… / 撤销：R03《……》";
      $("#submitInteraction").textContent = "提交法令";
      $("#interactionMethod").value = "";
      $("#interactionError").textContent = "";
      const backdrop = $("#interactionBackdrop");
      backdrop.classList.add("is-open");
      backdrop.setAttribute("aria-hidden", "false");
      requestAnimationFrame(() => $("#interactionMethod").focus());
    }

    function closeInteraction() {
      if (actionBusy) return;
      const backdrop = $("#interactionBackdrop");
      backdrop.classList.remove("is-open");
      backdrop.setAttribute("aria-hidden", "true");
      interactionRole = "";
      modalMode = "";
      if (interactionLastFocused && typeof interactionLastFocused.focus === "function") interactionLastFocused.focus();
    }

    async function submitInteractionRequest() {
      const method = $("#interactionMethod").value.trim();
      if (!method) {
        $("#interactionError").textContent = modalMode === "decree" ? "请输入新法令内容或撤销目标。" : "请输入互动方式后再提交。";
        $("#interactionMethod").focus();
        return;
      }
      const bridge = window.KingGameBridge;
      const bridgeMethod = modalMode === "decree" ? "requestDecree" : "submitInteraction";
      if (!bridge || typeof bridge[bridgeMethod] !== "function") {
        $("#interactionError").textContent = "宿主桥接尚未就绪，请刷新页面后重试。";
        return;
      }
      actionBusy = true;
      $("#submitInteraction").disabled = true;
      $("#cancelInteraction").disabled = true;
      $("#submitInteraction").textContent = "提交中……";
      $("#interactionError").textContent = "";
      showActionError();
      try {
        if (modalMode === "decree") await bridge.requestDecree(method);
        else await bridge.submitInteraction(interactionRole, method);
        actionBusy = false;
        closeInteraction();
      } catch (error) {
        actionBusy = false;
        $("#interactionError").textContent = error?.message || "互动提交失败，请稍后重试。";
      } finally {
        $("#submitInteraction").disabled = false;
        $("#cancelInteraction").disabled = false;
        $("#submitInteraction").textContent = modalMode === "decree" ? "提交法令" : "提交互动";
        render(state);
      }
    }

    async function runDailyAction() {
      if (actionBusy) return;
      const button = $("#primaryDailyAction");
      const action = button.dataset.action;
      const bridge = window.KingGameBridge;
      const method = action === "decree" ? "requestDecree" : action === "overnight" ? "overnight" : "";
      if (!method || !bridge || typeof bridge[method] !== "function") {
        showActionError("宿主桥接尚未就绪，请刷新页面后重试。");
        return;
      }
      actionBusy = true;
      showActionError();
      render(state);
      try {
        if (action === "decree") {
          let preparedState = state;
          if (!asObject(preparedState.系统)._当前国王) {
            if (typeof bridge.prepareDecree !== "function") throw new Error("宿主桥接缺少按键抽取国王能力，请刷新页面后重试。");
            preparedState = await bridge.prepareDecree();
            if (preparedState) render(preparedState);
          }
          if (asObject(preparedState.系统)._当前国王 === "玩家") {
            actionBusy = false;
            render(preparedState);
            openDecree();
            return;
          }
          await bridge.requestDecree();
        } else {
          await bridge[method]();
        }
      } catch (error) {
        showActionError(error?.message || "流程提交失败，请稍后重试。");
      } finally {
        actionBusy = false;
        render(state);
      }
    }

    function syncInteractionHitTarget() {
      const hit = $("#interactionHitTarget");
      const system = asObject(state.系统);
      if (roomMoving || actionBusy || system._每日阶段 !== "自由互动" || pitch !== 0) {
        hit.hidden = true;
        return;
      }
      const activeName = NAMES[((faceIndex % NAMES.length) + NAMES.length) % NAMES.length];
      const visual = document.querySelector(`.face[data-name="${activeName}"] .face-interact-btn`);
      if (!visual || visual.hidden) {
        hit.hidden = true;
        return;
      }
      const viewportRect = $("#viewport").getBoundingClientRect();
      const visualRect = visual.getBoundingClientRect();
      if (visualRect.width < 2 || visualRect.height < 2) {
        hit.hidden = true;
        return;
      }
      hit.style.left = `${visualRect.left - viewportRect.left}px`;
      hit.style.top = `${visualRect.top - viewportRect.top}px`;
      hit.style.width = `${visualRect.width}px`;
      hit.style.height = `${visualRect.height}px`;
      hit.dataset.interactionName = activeName;
      hit.setAttribute("aria-label", visual.textContent);
      hit.hidden = false;
    }

    function syncPortraitHitTarget() {
      const hit = $("#portraitHitTarget");
      if (roomMoving || pitch !== 0 || $("#portraitBackdrop").classList.contains("is-open")) {
        hit.hidden = true;
        return;
      }
      const activeName = NAMES[((faceIndex % NAMES.length) + NAMES.length) % NAMES.length];
      const visual = document.querySelector(`.face[data-name="${activeName}"] .portrait`);
      if (!visual) {
        hit.hidden = true;
        return;
      }
      const viewportRect = $("#viewport").getBoundingClientRect();
      const visualRect = visual.getBoundingClientRect();
      if (visualRect.width < 2 || visualRect.height < 2) {
        hit.hidden = true;
        return;
      }
      hit.style.left = `${visualRect.left - viewportRect.left}px`;
      hit.style.top = `${visualRect.top - viewportRect.top}px`;
      hit.style.width = `${visualRect.width}px`;
      hit.style.height = `${visualRect.height}px`;
      hit.dataset.portraitName = activeName;
      hit.setAttribute("aria-label", `查看${activeName}证件照全图`);
      hit.hidden = false;
    }

    function queueInteractionHitSync(delay = 0, settleRoom = false) {
      clearTimeout(hitSyncTimer);
      $("#interactionHitTarget").hidden = true;
      $("#portraitHitTarget").hidden = true;
      hitSyncTimer = window.setTimeout(() => {
        if (settleRoom) roomMoving = false;
        syncInteractionHitTarget();
        syncPortraitHitTarget();
      }, delay);
    }

    function updateNavigation() {
      const normalized = ((faceIndex % 4) + 4) % 4;
      document.querySelectorAll(".face[data-name]").forEach((face, index) => {
        const active = pitch === 0 && index === normalized;
        face.classList.toggle("is-active", active);
        face.setAttribute("aria-hidden", active ? "false" : "true");
      });
      document.querySelectorAll(".map-room, .face-dot").forEach(node => {
        node.setAttribute("aria-current", Number(node.dataset.face) === normalized ? "true" : "false");
      });
      $("#lookUp").disabled = pitch >= 90;
      $("#lookDown").disabled = pitch <= -90;
      renderDailyFlow(asObject(state.系统));
    }

    function applyRoomTransform() {
      const prism = $("#prism");
      prism.dataset.view = pitch >= 45 ? "top" : pitch <= -45 ? "bottom" : "side";
      $("#surfaceOverlay").dataset.view = prism.dataset.view;
      const rootStyle = getComputedStyle(document.documentElement);
      const progress = Math.min(1, Math.abs(pitch) / 90);
      const sideScale = Number.parseFloat(rootStyle.getPropertyValue("--side-focus-scale")) || 1;
      const surfaceScale = Number.parseFloat(rootStyle.getPropertyValue("--surface-focus-scale")) || .78;
      const sideCamera = Number.parseFloat(rootStyle.getPropertyValue("--side-camera-ratio")) || .45;
      const surfaceCamera = Number.parseFloat(rootStyle.getPropertyValue("--surface-camera-ratio")) || .16;
      prism.style.setProperty("--focus-scale", String(sideScale + (surfaceScale - sideScale) * progress));
      prism.style.setProperty("--camera-ratio", String(sideCamera + (surfaceCamera - sideCamera) * progress));
      prism.style.transform = `translateZ(var(--camera-depth)) rotateX(${pitch}deg) rotateY(${angle}deg) scale3d(var(--focus-scale), var(--focus-scale), var(--focus-scale))`;
      roomMoving = true;
      queueInteractionHitSync(780, true);
    }

    function rotateTo(index) {
      faceIndex = ((index % 4) + 4) % 4;
      const turns = Math.round((angle / 90 - faceIndex) / 4);
      angle = (faceIndex + turns * 4) * 90;
      applyRoomTransform();
      updateNavigation();
    }

    function rotateVertical(delta) {
      pitch = Math.max(-90, Math.min(90, Math.round((pitch + delta) / 90) * 90));
      applyRoomTransform();
      updateNavigation();
    }

    function makeDots() {
      const dots = $("#faceDots");
      NAMES.forEach((name, index) => {
        const dot = el("button", "face-dot");
        dot.type = "button";
        dot.dataset.face = index;
        dot.setAttribute("aria-label", `查看${name}`);
        dot.addEventListener("click", () => rotateTo(index));
        dots.append(dot);
      });
      document.querySelectorAll(".map-room").forEach(room => room.addEventListener("click", () => rotateTo(Number(room.dataset.face))));
    }

    function bindRotation() {
      const prism = $("#prism");
      $("#prevFace").addEventListener("click", () => rotateTo(faceIndex - 1));
      $("#nextFace").addEventListener("click", () => rotateTo(faceIndex + 1));
      $("#lookUp").addEventListener("click", () => rotateVertical(90));
      $("#lookDown").addEventListener("click", () => rotateVertical(-90));
      prism.addEventListener("transitionend", event => {
        if (event.propertyName !== "transform") return;
        roomMoving = false;
        syncInteractionHitTarget();
        syncPortraitHitTarget();
      });
      document.addEventListener("keydown", event => {
        if (
          $("#playerRulesBackdrop").classList.contains("is-open") ||
          $("#interactionBackdrop").classList.contains("is-open") ||
          $("#portraitBackdrop").classList.contains("is-open") ||
          $("#endingBackdrop").classList.contains("is-open")
        ) return;
        const key = event.key.toLowerCase();
        if (key === "a" || event.key === "ArrowLeft") rotateTo(faceIndex - 1);
        if (key === "d" || event.key === "ArrowRight") rotateTo(faceIndex + 1);
        if (key === "w" || event.key === "ArrowUp") rotateVertical(90);
        if (key === "s" || event.key === "ArrowDown") rotateVertical(-90);
      });
      window.addEventListener("resize", () => queueInteractionHitSync(80));
    }

    function bindDrawer() {
      const backdrop = $("#playerRulesBackdrop");
      const open = () => {
        lastFocused = document.activeElement;
        backdrop.classList.add("is-open");
        backdrop.setAttribute("aria-hidden", "false");
        $("#closePlayerRules").focus();
      };
      const close = () => {
        backdrop.classList.remove("is-open");
        backdrop.setAttribute("aria-hidden", "true");
        if (lastFocused && typeof lastFocused.focus === "function") lastFocused.focus();
      };
      $("#openPlayerRules").addEventListener("click", open);
      $("#closePlayerRules").addEventListener("click", close);
      backdrop.addEventListener("pointerdown", event => { if (event.target === backdrop) close(); });
      document.addEventListener("keydown", event => {
        if (
          event.key === "Escape" &&
          backdrop.classList.contains("is-open") &&
          !$("#portraitBackdrop").classList.contains("is-open") &&
          !$("#endingBackdrop").classList.contains("is-open")
        ) close();
      });
    }

    function bindMediaModals() {
      const portraitBackdrop = $("#portraitBackdrop");
      const endingBackdrop = $("#endingBackdrop");
      $("#portraitHitTarget").addEventListener("click", event => {
        const name = event.currentTarget.dataset.portraitName || NAMES[((faceIndex % NAMES.length) + NAMES.length) % NAMES.length];
        const visual = document.querySelector(`.face[data-name="${name}"] .portrait`);
        openPortrait(name, visual || event.currentTarget);
      });
      $("#closePortrait").addEventListener("click", () => closePortrait());
      portraitBackdrop.addEventListener("pointerdown", event => { if (event.target === portraitBackdrop) closePortrait(); });
      portraitBackdrop.addEventListener("keydown", event => {
        if (!portraitBackdrop.classList.contains("is-open")) return;
        if (event.key === "Escape") {
          event.preventDefault();
          event.stopPropagation();
          closePortrait();
        } else if (event.key === "Tab") {
          event.preventDefault();
          $("#closePortrait").focus();
        }
      });

      $("#reopenEnding").addEventListener("click", () => openEnding());
      $("#closeEnding").addEventListener("click", () => closeEnding());
      endingBackdrop.addEventListener("pointerdown", event => { if (event.target === endingBackdrop) closeEnding(); });
      endingBackdrop.addEventListener("keydown", event => {
        if (!endingBackdrop.classList.contains("is-open")) return;
        if (event.key === "Escape") {
          event.preventDefault();
          event.stopPropagation();
          closeEnding();
        } else if (event.key === "Tab") {
          event.preventDefault();
          $("#closeEnding").focus();
        }
      });
    }

    function bindDailyFlow() {
      const backdrop = $("#interactionBackdrop");
      $("#primaryDailyAction").addEventListener("click", runDailyAction);
      $("#interactionHitTarget").addEventListener("click", event => openInteraction(event.currentTarget.dataset.interactionName || NAMES[((faceIndex % NAMES.length) + NAMES.length) % NAMES.length]));
      $("#cancelInteraction").addEventListener("click", closeInteraction);
      $("#submitInteraction").addEventListener("click", submitInteractionRequest);
      backdrop.addEventListener("pointerdown", event => { if (event.target === backdrop) closeInteraction(); });
      backdrop.addEventListener("keydown", event => {
        if (!backdrop.classList.contains("is-open")) return;
        if (event.key === "Escape") {
          event.preventDefault();
          closeInteraction();
          return;
        }
        if (event.key === "Enter" && (event.ctrlKey || event.metaKey)) {
          event.preventDefault();
          submitInteractionRequest();
          return;
        }
        if (event.key === "Tab") {
          const focusable = [$("#interactionMethod"), $("#cancelInteraction"), $("#submitInteraction")].filter(node => !node.disabled);
          const first = focusable[0];
          const last = focusable[focusable.length - 1];
          if (event.shiftKey && document.activeElement === first) {
            event.preventDefault();
            last.focus();
          } else if (!event.shiftKey && document.activeElement === last) {
            event.preventDefault();
            first.focus();
          }
        }
      });
    }

    async function readBridge() {
      const bridge = window.KingGameBridge;
      if (!bridge) return;
      try {
        if (typeof bridge.getUserName === "function") userName = String(await bridge.getUserName() || "你");
        else if (bridge.userName) userName = String(bridge.userName);
        render(state);

        let hostedState;
        if (typeof bridge.getState === "function") hostedState = await bridge.getState();
        else if (typeof bridge.getVariables === "function") hostedState = await bridge.getVariables();
        else if (bridge.state) hostedState = bridge.state;
        if (hostedState) render(hostedState);

        if (typeof bridge.subscribe === "function") {
          bridge.subscribe(nextState => { if (nextState) render(nextState); });
        }
      } catch (error) {
        console.warn("[KingGame] 宿主状态读取失败，保留内置预览数据。", error);
      }
    }

    async function startDossier() {
      const bridge = window.KingGameBridge;
      const makerMark = String.fromCharCode(108, 111, 117, 105, 115, 72, 77);
      if (bridge && typeof bridge.getCardName === "function") {
        const runtimeName = String(await bridge.getCardName() || "");
        if (runtimeName && !runtimeName.includes(makerMark)) {
          document.documentElement.setAttribute("data-card-mismatch", "true");
          document.body.replaceChildren();
          return;
        }
      }
      makeDots();
      bindRotation();
      bindDrawer();
      bindMediaModals();
      bindDailyFlow();
      render(PREVIEW_STATE);
      void readBridge();
      window.addEventListener("kinggame:state", event => { if (event.detail) render(event.detail); });
    }

    void startDossier();
  })();
  </script>
